/* Flash-free theme boot: runs before first paint. */
try{
  var t=localStorage.getItem('bt-theme');
  if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
  document.documentElement.dataset.theme=t;
  var tm=document.querySelector('meta[name=theme-color]');

<style>
/* ============================= THEME ============================= */
:root{
  --bg:#faf5ef; --bg2:#ffffff; --bg3:#f1e9df; --bg4:#e6dccd;

  --border:#e0d6c8; --border2:#c9bda9;
  --accent:#c9564a; --accent-soft:#c9564a1c; --accent-fg:#ffffff;
  --teal:#1e7361; --teal-soft:#2f8f7b1a;
  --danger:#c23b3b; --danger-soft:#c23b3b14;
  --warn:#8a6212; --warn-soft:#b07d181a;
  --ok:#3d8f4e; --ok-soft:#3d8f4e1a;
  --sel:#c9564a14; --shadow:0 6px 24px rgba(60,40,20,.16);

  --border:#ddd2ec; --border2:#c3b4dc;
  --accent:#f4b8c8; --accent-soft:#f4b8c83d; --accent-fg:#4a1f2e;
  --teal:#35786a; --teal-soft:#7fd6c226;
  --danger:#b8506d; --danger-soft:#b8506d14;
  --warn:#8a6212; --warn-soft:#e8c96e2e;
  --ok:#468655; --ok-soft:#8fd6a02e;
  --sel:#f4b8c833; --shadow:0 6px 24px rgba(122,92,146,.18);
}
html[data-theme="dark"] body{
  --bg:#121014; --bg2:#1a171c; --bg3:#282329; --bg4:#383239;
  --fg:#f4f0ea; --fg-dim:#c8c2ba; --fg-faint:#948d84;
  --border:#4a444c; --border2:#6a636d;

/* ============================= BASE ============================= */
*{box-sizing:border-box}
html{height:100%}
body{min-height:100%;margin:0;background:var(--bg);color:var(--fg);
  font:16px/1.5 var(--sans);-webkit-tap-highlight-color:transparent;

button{cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-height:48px}
button:active{transform:scale(.985)}
button:disabled{opacity:.45;cursor:default;transform:none}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:650}

input[type=text],input[type=search],input[type=number],input[type=date],select,textarea{

.dot{width:9px;height:9px;border-radius:50%;background:var(--border2)}

/* ---- forms / editor ---- */
.formfoot{display:flex;gap:10px;margin-top:22px}
.formfoot .primary{flex:1}
.agerow{display:flex;gap:10px;align-items:center}
.agerow input{flex:1}
/* ---- settings ---- */
.setsec{margin-bottom:26px}
.setsec h3{font-size:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint);margin-bottom:10px}
.setrow{display:flex;align-items:center;gap:10px;padding:6px 0}
.devpanel{border:2px dashed var(--border2);border-radius:14px;padding:14px;margin-top:8px}
/* ---- empty states ---- */
.empty{text-align:center;color:var(--fg-dim);padding:36px 16px}
.empty .ee{font-size:42px;margin-bottom:10px}
/* ============================= OVERLAYS ============================= */
#toasts{position:fixed;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none}

#modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);
  padding:22px;width:100%;max-width:420px;max-height:86vh;overflow:auto}

.mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* completion flow */
.stepper{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0}
.stepper button{width:64px;height:64px;min-height:64px;font-size:28px;border-radius:16px;flex:none}
.stepper input{width:110px;text-align:center;font-size:30px;font-weight:800;min-height:64px;-moz-appearance:textfield}

<body>
<header id="topbar">

<main id="main"></main>
<div id="toasts" aria-live="polite"></div>

<script>
'use strict';
/* ============================= HELPERS ============================= */
const $=s=>document.querySelector(s);
function el(tag,attrs,...kids){
  const n=document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(v==null||v===false) continue;
    if(k==='class') n.className=v;
    else if(k==='html') n.innerHTML=v;
    else if(k.startsWith('on')) n.addEventListener(k.slice(2),v);
    else if(k==='value') n.value=v;
    else if(k==='checked') n.checked=!!v;
    else if(k==='disabled') n.disabled=!!v;
    else n.setAttribute(k,v===true?'':v);
  }
  for(const k of kids.flat(9)){ if(k==null||k===false) continue; n.append(k.nodeType?k:String(k)); }
  return n;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function debounce(fn,ms){let t;const f=(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};f.now=(...a)=>{clearTimeout(t);fn(...a);};return f;}
function toast(msg,kind){
  const t=el('div',{class:'toast'+(kind==='err'?' err':'')},msg);
  $('#toasts').append(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),450);},kind==='err'?4200:2600);
}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString(undefined,{day:'numeric',month:'short'});}
function localToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const THEME_COLORS={light:'#faf5ef',dark:'#121014',pastel:'#f3eefa'};
function setTheme(t){
  document.documentElement.dataset.theme=t;
  try{localStorage.setItem('bt-theme',t);}catch(e){}
  const tm=document.querySelector('meta[name=theme-color]');
  if(tm)tm.setAttribute('content',THEME_COLORS[t]||THEME_COLORS.light);
  renderView(App.stack[App.stack.length-1]);
}
/* Modal system.
   Modals never create history entries; a Back press with a modal open cancels
   the modal only (the popstate handler restores the current view's entry).
   Every modal passes onCancel so no promise is ever left pending. */
const modalState={open:false,onCancel:null,prevFocus:null};
function showModal(node,onCancel){
  const w=$('#modalWrap');w.innerHTML='';w.append(node);w.classList.remove('hidden');
  node.setAttribute('role','dialog');node.setAttribute('aria-modal','true');
  modalState.open=true;modalState.onCancel=onCancel||null;
  modalState.prevFocus=document.activeElement;
  $('#main').setAttribute('inert','');$('#topbar').setAttribute('inert','');
  const f=node.querySelector('input,select,textarea,button');
  if(f)setTimeout(()=>{try{f.focus();}catch(e){}},30);
}
function closeModal(){
  modalState.open=false;modalState.onCancel=null;
  const w=$('#modalWrap');w.classList.add('hidden');w.innerHTML='';
  $('#main').removeAttribute('inert');$('#topbar').removeAttribute('inert');
  const p=modalState.prevFocus;modalState.prevFocus=null;
  if(p&&p.isConnected)try{p.focus();}catch(e){}
}
function cancelModal(){
  if(!modalState.open)return;
  const cb=modalState.onCancel;
  closeModal();
  if(cb)cb();
}
function confirmDlg(msg,{danger,okText}={}){
  return new Promise(res=>{
    showModal(el('div',{class:'modal'},
      el('div',{style:'font-size:16px;white-space:pre-wrap'},msg),
      el('div',{class:'mbtns'},
        el('button',{onclick:()=>{closeModal();res(false);}},'Cancel'),
        el('button',{class:danger?'danger':'primary',onclick:()=>{closeModal();res(true);}},okText||'OK'))),
      ()=>res(false));
  });
}
/* IndexedDB key-value store */
const store={db:null,ok:false,
  init(){return new Promise(res=>{try{
    const r=indexedDB.open('baby-time',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>{store.db=r.result;store.ok=true;res();};
    r.onerror=()=>res();
  }catch(e){res();}});},
  get(k){return new Promise(res=>{if(!store.ok)return res(undefined);try{
    const t=store.db.transaction('kv').objectStore('kv').get(k);
    t.onsuccess=()=>res(t.result);t.onerror=()=>res(undefined);}catch(e){res(undefined);}});},
  set(k,v){return new Promise(res=>{if(!store.ok)return res(false);try{
    const t=store.db.transaction('kv','readwrite').objectStore('kv').put(v,k);
    t.onsuccess=()=>res(true);t.onerror=()=>res(false);}catch(e){res(false);}});},
  del(k){return new Promise(res=>{if(!store.ok)return res();try{
    const t=store.db.transaction('kv','readwrite').objectStore('kv').delete(k);
    t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}
};

  'touch':{label:'Massage & touch',emoji:'\u{1F90D}'},

};

const SEED_ACTIVITIES=[
/* -------- Tummy time (6) -------- */

 description:'Lay bub tummy-down on a firm mat with one or two toys just in reach. Get down to eye level and chat or jiggle a toy to encourage lifting and turning the head.\n\nFinish before the grizzles start, so tummy time stays a happy place.'},

/* ============================= APP STATE ============================= */
const App={
  data:null,
  stack:[],
  nowOffsetMs:0,
  timer:null,      /* {activityId, startedAt, accumMs, paused} — wall-clock stopwatch */
  timerTick:null,
  installPrompt:null,
  wakeLock:null,
  browse:{q:'',cat:null,tags:[],allAges:false,showRetired:false}
};
App.now=()=>new Date(Date.now()+App.nowOffsetMs);
/* ============================= DATA MODEL ============================= */
function blankData(){
  return {format:'baby-time',version:1,seedVersion:0,
    settings:{birthDate:null},
    activities:[],itinerary:null};
}
function activityFromSeed(s){
  return {id:s.id,name:s.name,description:s.description,category:s.category,
    ageRange:{minMonths:s.ageRange.minMonths,maxMonths:s.ageRange.maxMonths},
    baseDuration:s.baseDuration,tags:[...s.tags],
    flagged:false,retired:false,custom:false,modified:false,
    lastReviewedAt:null,history:[]};
}
function seedData(){
  const d=blankData();
  d.activities=SEED_ACTIVITIES.map(activityFromSeed);
  d.seedVersion=SEED_VERSION;
  return d;
}
function mergeSeeds(d){
  if((d.seedVersion||0)>=SEED_VERSION)return false;
  for(const s of SEED_ACTIVITIES){
    const a=d.activities.find(x=>x.id===s.id);
    if(!a){d.activities.push(activityFromSeed(s));continue;}
    if(a.custom||a.modified)continue;
    a.name=s.name;a.description=s.description;a.category=s.category;
    a.ageRange={minMonths:s.ageRange.minMonths,maxMonths:s.ageRange.maxMonths};
    a.baseDuration=s.baseDuration;a.tags=[...s.tags];
  }
  d.seedVersion=SEED_VERSION;
  return true;
}
function clampNum(v,lo,hi,def){v=+v;if(!isFinite(v))return def;return Math.min(hi,Math.max(lo,v));}
function normalize(d){
  if(!d||typeof d!=='object'||d.format!=='baby-time'||!Array.isArray(d.activities))
    throw new Error('Not a Baby Time data file.');
  d.version=1;
  d.seedVersion=+d.seedVersion||0;
  d.settings=Object.assign({birthDate:null},d.settings);
  if(d.settings.birthDate&&!/^\d{4}-\d{2}-\d{2}$/.test(d.settings.birthDate))d.settings.birthDate=null;
  const seen=new Set();
  d.activities=d.activities.filter(a=>{
    if(!a||typeof a!=='object'||!a.id||seen.has(a.id))return false;
    seen.add(a.id);return true;
  });
  for(const a of d.activities){
    a.name=String(a.name||'Unnamed activity');
    a.description=String(a.description||'');
    a.category=String(a.category||'other');
    const r=a.ageRange||{};
    a.ageRange={minMonths:clampNum(r.minMonths,0,60,0),maxMonths:clampNum(r.maxMonths,0,60,12)};
    if(a.ageRange.maxMonths<a.ageRange.minMonths)a.ageRange.maxMonths=a.ageRange.minMonths;
    a.baseDuration=clampNum(a.baseDuration,1,120,5);
    a.tags=Array.isArray(a.tags)?a.tags.map(t=>String(t).trim()).filter(Boolean):[];
    a.flagged=!!a.flagged;a.retired=!!a.retired;a.custom=!!a.custom;a.modified=!!a.modified;
    a.lastReviewedAt=a.lastReviewedAt||null;
    a.history=(Array.isArray(a.history)?a.history:[])
      .filter(h=>h&&h.at&&isFinite(+h.engagedMinutes))
      .map(h=>({at:String(h.at),engagedMinutes:clampNum(h.engagedMinutes,0,600,0),wentWell:!!h.wentWell}))
      .sort((x,y)=>x.at<y.at?-1:x.at>y.at?1:0)
      .slice(-100);
  }
  const it=d.itinerary;
  if(it&&Array.isArray(it.items)&&it.items.length
     &&it.items.every(i=>i&&d.activities.some(a=>a.id===i.activityId))){
    it.pos=clampNum(it.pos,0,it.items.length-1,0);
    it.targetMinutes=clampNum(it.targetMinutes,1,600,30);
    for(const i of it.items){
      if(!['pending','done','skipped'].includes(i.status))i.status='pending';
      i.engagedMinutes=isFinite(+i.engagedMinutes)?+i.engagedMinutes:null;
    }
  }else d.itinerary=null;
  return d;
}
function A(id){return App.data.activities.find(a=>a.id===id)||null;}
function uid(){return 'u-'+Math.random().toString(36).slice(2,9);}
/* ---- persistence ---- */
const schedulePersist=debounce(async()=>{
  if(!App.data)return;
  const ok=await store.set('data',{time:Date.now(),json:JSON.stringify(App.data)});
  if(!ok&&!App.warnedStorage){
    App.warnedStorage=true;
    toast('Saving failed — this browser is blocking storage. Export a backup from Settings.','err');
  }
},400);
function touch(){schedulePersist();}
/* ============================= DOMAIN ============================= */
function addMonths(d,m){
  /* clamps the day so 31 Jan + 1 month = 28/29 Feb, never 2/3 Mar */
  const r=new Date(d.getFullYear(),d.getMonth()+m,1);
  const dim=new Date(r.getFullYear(),r.getMonth()+1,0).getDate();
  r.setDate(Math.min(d.getDate(),dim));
  return r;
}
function ageMonths(){
  const dob=App.data&&App.data.settings.birthDate;
  if(!dob)return null;
  const b=new Date(dob+'T00:00:00'),n=App.now();
  let m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  let anchor=addMonths(b,m);
  while(m>0&&anchor>n){m--;anchor=addMonths(b,m);}
  if(m<0)return 0;
  const frac=Math.max(0,Math.min((n-anchor)/86400000/30.44,0.999));
  return m+frac;
}
function ageLabel(){
  const m=ageMonths();
  if(m==null)return '';
  const months=Math.floor(m);
  const weeks=Math.floor((m-months)*4.345);
  if(months===0&&weeks===0)return 'brand new';
  const mp=months===1?'1 month':months+' months';
  const wp=weeks===1?'1 week':weeks+' weeks';
  if(months===0)return wp+' old';
  if(weeks===0)return mp+' old';
  return mp+', '+wp;
}
function isAgeAppropriate(a){
  const m=ageMonths();
  if(m==null)return true;
  return a.ageRange.minMonths<=m&&m<=a.ageRange.maxMonths;
}
function isAvailable(a){return !a.retired&&isAgeAppropriate(a);}
function isPickable(a){return isAvailable(a)&&!a.flagged;}
function expectedDuration(a){
  const last=a.history.slice(-5).map(h=>h.engagedMinutes).filter(Number.isFinite);
  if(!last.length)return a.baseDuration;
  return Math.max(1,Math.round(last.reduce((s,m)=>s+m,0)/last.length));
}
function poorStreak(a){
  let n=0;
  for(let i=a.history.length-1;i>=0;i--){
    const h=a.history[i];
    if(a.lastReviewedAt&&h.at<=a.lastReviewedAt)break;
    if(h.wentWell)break;
    n++;
  }
  return n;
}
function recordCompletion(a,mins,wentWell){
  a.history.push({at:App.now().toISOString(),engagedMinutes:mins,wentWell:!!wentWell});
  if(a.history.length>100)a.history=a.history.slice(-100);
  const wasFlagged=a.flagged;
  if(poorStreak(a)>=3)a.flagged=true;
  touch();
  return a.flagged&&!wasFlagged;
}
function flaggedCount(){return App.data.activities.filter(a=>a.flagged&&!a.retired).length;}
/* ---- activity stopwatch (real wall clock, not App.now — dev clock shifts
       must not distort a live timing session) ---- */
function startTimer(id){App.timer={activityId:id,startedAt:Date.now(),accumMs:0,paused:false};}
function timerElapsedMs(){
  const t=App.timer;
  if(!t)return 0;
  return t.accumMs+(t.paused?0:Date.now()-t.startedAt);
}
function pauseTimer(){const t=App.timer;if(t&&!t.paused){t.accumMs+=Date.now()-t.startedAt;t.paused=true;}}
function resumeTimer(){const t=App.timer;if(t&&t.paused){t.startedAt=Date.now();t.paused=false;}}
function fmtElapsed(ms){
  const s=Math.max(0,Math.floor(ms/1000));
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
/* ---- picking & itineraries ---- */
function daysSinceLast(a){
  if(!a.history.length)return null;
  return (App.now()-new Date(a.history[a.history.length-1].at))/86400000;
}
function recencyFactor(a){
  const d=daysSinceLast(a);
  if(d==null)return 1.1;
  if(d<1)return .15;
  if(d<2)return .4;
  if(d<3)return .7;
  return 1;
}
function scoreActivity(a,picked){
  const sameCat=picked.filter(p=>p.category===a.category).length;
  return Math.max(.01,recencyFactor(a)*Math.pow(.35,sameCat));
}
function weightedPick(list,scoreFn,rng){
  let total=0;
  const w=list.map(a=>{const s=scoreFn(a);total+=s;return s;});
  let r=rng()*total;
  for(let i=0;i<list.length;i++){r-=w[i];if(r<=0)return list[i];}
  return list[list.length-1];
}
function pickRandomActivity(excludeId,rng){
  rng=rng||Math.random;
  let pool=App.data.activities.filter(isPickable);
  if(pool.length>1&&excludeId)pool=pool.filter(a=>a.id!==excludeId);
  if(!pool.length)return null;
  return weightedPick(pool,a=>scoreActivity(a,[]),rng);
}
function buildItinerary(target,rng){
  rng=rng||Math.random;
  const pool=App.data.activities.filter(isPickable);
  const picked=[];
  let remaining=target;
  const overshoot=Math.min(5,Math.round(target*.2));
  while(remaining>0){
    const fits=pool.filter(a=>!picked.includes(a)&&expectedDuration(a)<=remaining+overshoot);
    if(!fits.length)break;
    const a=weightedPick(fits,x=>scoreActivity(x,picked),rng);
    picked.push(a);
    remaining-=expectedDuration(a);
  }
  if(!picked.length){
    const sorted=[...pool].sort((x,y)=>expectedDuration(x)-expectedDuration(y));
    if(!sorted.length)return {items:[],note:'No activities are available right now — check the Review inbox or Browse with “All ages” on.'};
    return {items:[sorted[0]],note:'Shortest available activity is '+expectedDuration(sorted[0])+' min, a bit over your target.'};
  }
  return {items:picked,note:null};
}
function itineraryTotal(items){return items.reduce((s,a)=>s+expectedDuration(a),0);}
/* ============================= NAVIGATION ============================= */
function nav(view,params,replace){
  const entry={view,params:params||{}};
  if(replace&&App.stack.length){
    App.stack[App.stack.length-1]=entry;
    history.replaceState({d:App.stack.length-1},'');
  }else{
    App.stack.push(entry);
    history.pushState({d:App.stack.length-1},'');
  }
  renderView(entry);
}
function goBack(){if(App.stack.length>1)history.back();}
function goHome(){
  /* unwind real browser history back to the root entry */
  const n=App.stack.length-1;
  if(n>0)history.go(-n);
  else renderView(App.stack[0]);
}
function resetStack(view){
  /* hard reset (erase / import): the current entry becomes the new root */
  App.stack=[{view,params:{}}];
  history.replaceState({d:0},'');
  renderView(App.stack[0]);
}
window.addEventListener('popstate',e=>{
  if(modalState.open){
    /* Back with a modal open cancels the modal only; restore the entry
       the browser just popped so the view itself stays put. */
    cancelModal();
    history.pushState({d:App.stack.length-1},'');
    return;
  }
  const d=e.state&&typeof e.state.d==='number'?e.state.d:0;
  App.stack.length=Math.max(1,Math.min(App.stack.length,d+1));
  renderView(App.stack[App.stack.length-1]);
});
function releaseWakeLock(){
  App.wantWakeLock=false;
  if(App.wakeLock){try{App.wakeLock.release();}catch(e){}App.wakeLock=null;}
}
function requestWakeLock(){
  if(!navigator.wakeLock||!App.wantWakeLock)return;
  const tok=App.wakeToken;
  navigator.wakeLock.request('screen').then(l=>{
    if(App.wakeToken!==tok||!App.wantWakeLock){try{l.release();}catch(e){}}
    else App.wakeLock=l;
  }).catch(()=>{});
}
function renderView(entry){
  App.wakeToken=(App.wakeToken||0)+1;
  releaseWakeLock();
  if(App.timerTick){clearInterval(App.timerTick);App.timerTick=null;}
  const m=$('#main');m.innerHTML='';
  $('#tbRight').innerHTML='';
  $('#tbBack').classList.toggle('hidden',App.stack.length<=1);
  window.scrollTo(0,0);
  const v={
    onboarding:renderOnboarding,home:renderHome,browse:renderBrowse,
    activity:renderActivity,itinerarySetup:renderItinerarySetup,
    itineraryDone:renderItineraryDone,review:renderReview,
    editor:renderEditor,settings:renderSettings
  }[entry.view];
  if(v)v(m,entry.params);
}

/* ---- completion flow ---- */
function askEngagedMinutes(a,elapsedMs){
  return new Promise(res=>{
    const timed=elapsedMs!=null;
    const start=timed?Math.max(0,Math.min(600,Math.round(elapsedMs/60000))):expectedDuration(a);
    const inp=el('input',{type:'number',inputmode:'numeric',min:0,max:600,value:start});
    const bump=d=>{const v=Math.max(0,Math.min(600,(+inp.value||0)+d));inp.value=v;};
    showModal(el('div',{class:'modal'},
      el('h2',null,'How long was bub engaged?'),
      el('div',{class:'dim small'},a.name),
      timed?el('div',{class:'small',style:'margin-top:8px'},
        '⏱ Timer clocked '+fmtElapsed(elapsedMs)+' — adjust below if bub checked out earlier.'):null,
      el('div',{class:'stepper'},
        el('button',{onclick:()=>bump(-1)},'−'),
        inp,
        el('button',{onclick:()=>bump(1)},'+')),
      el('div',{class:'small faint',style:'text-align:center'},'minutes'),
      el('div',{class:'mbtns'},
        el('button',{onclick:()=>{closeModal();res(null);}},'Cancel'),
        el('button',{class:'primary',onclick:()=>{
          const v=+inp.value;
          if(!isFinite(v)||v<0){toast('Enter the minutes bub was engaged','err');return;}
          closeModal();res(Math.min(600,Math.round(v)));
        }},'Log it'))),
      ()=>res(null));
  });
}
function askWentWell(a){
  return new Promise(res=>{
    showModal(el('div',{class:'modal'},
      el('h2',null,'How did it go?'),
      el('div',{class:'dim small'},a.name),
      el('div',{class:'feelbtns'},
        el('button',{class:'good',onclick:()=>{closeModal();res(true);}},
          el('div',{class:'fe'},'\u{1F60A}'),'Went well'),
        el('button',{class:'poor',onclick:()=>{closeModal();res(false);}},
          el('div',{class:'fe'},'\u{1F615}'),'Went poorly')),
      el('div',{class:'mbtns'},
        el('button',{class:'ghost',onclick:()=>{closeModal();res(null);}},'Cancel'))),
      ()=>res(null));
  });
}
async function completeActivity(a,ctx){
  if(App.completing)return;
  App.completing=true;
  try{
    /* freeze the stopwatch while the log dialogs are open */
    const timerWasRunning=App.timer&&App.timer.activityId===a.id&&!App.timer.paused;
    const elapsedMs=App.timer&&App.timer.activityId===a.id?timerElapsedMs():null;
    pauseTimer();
    const resume=()=>{if(timerWasRunning)resumeTimer();};
    const mins=await askEngagedMinutes(a,elapsedMs);
    if(mins==null){resume();return;}
    const well=await askWentWell(a);
    if(well==null){resume();return;}
    App.timer=null; /* session logged — next visit starts a fresh timer */
    const newlyFlagged=recordCompletion(a,mins,well);
    if(newlyFlagged)toast('\u{1F6A9} '+a.name+' flagged after three tough runs — it’s waiting in the Review inbox');
    else toast(well?'Logged — nice one \u{1F389}':'Logged — they can’t all be winners');
    if(ctx==='itinerary'&&App.data.itinerary){
      const it=App.data.itinerary;
      it.items[it.pos].engagedMinutes=mins;
      advanceItinerary('done');
    }else{
      renderView(App.stack[App.stack.length-1]);
    }
  }finally{App.completing=false;}
}
function advanceItinerary(status){
  const it=App.data.itinerary;
  if(!it)return;
  const t=Date.now();
  if(App.lastAdvance&&t-App.lastAdvance<450)return; /* debounce double taps on Skip */
  App.lastAdvance=t;
  it.items[it.pos].status=status;
  let next=-1;
  for(let i=0;i<it.items.length;i++){
    if(it.items[i].status==='pending'){next=i;break;}
  }
  if(next===-1){
    const summary={
      total:it.items.length,
      done:it.items.filter(i=>i.status==='done').length,
      skipped:it.items.filter(i=>i.status==='skipped').length,
      engaged:it.items.reduce((s,i)=>s+(i.engagedMinutes||0),0),
      names:it.items.map(i=>({name:(A(i.activityId)||{}).name||'?',status:i.status}))
    };
    App.data.itinerary=null;
    touch();
    nav('itineraryDone',{summary},true);
  }else{
    it.pos=next;
    touch();
    nav('activity',{id:it.items[next].activityId,ctx:'itinerary'},true);
  }
}

  for(const p of presets){
    chips.append(el('button',{class:'chip'+(p===30?' on':''),'data-v':p,onclick:()=>setTarget(p)},p+' min'));
  }
  custom.addEventListener('input',()=>{if(+custom.value>0)setTarget(+custom.value,true);});

        el('span',{class:n.status==='done'?'dim':'faint'},n.status==='done'?'✔ done':'skipped')))),
    el('button',{class:'primary',style:'width:100%;margin-top:14px;min-height:56px',onclick:goHome},'Back to home'));
}
/* ---- review inbox ---- */
function renderReview(m){
  setTitle('Review inbox');
  const flagged=App.data.activities.filter(a=>a.flagged);
  if(!flagged.length){
    m.append(el('div',{class:'empty'},el('div',{class:'ee'},'\u{1F389}'),'Nothing needs review.'));
  }else{
    m.append(el('p',{class:'dim'},'These went poorly three times in a row. Have a think: wrong time of day, outgrown, or just a rough patch?'));
    for(const a of flagged){
      const recent=a.history.slice(-3);
      m.append(el('div',{class:'card'},
        el('div',{class:'nm',style:'font-weight:700'},a.name),
        el('div',{class:'small dim'},catMeta(a.category).emoji+' '+catMeta(a.category).label+' · ~'+expectedDuration(a)+' min'),
        el('div',{class:'hist3'},recent.map(h=>
          el('span',{class:'hdot '+(h.wentWell?'good':'poor')},fmtDate(h.at)+' '+(h.wentWell?'\u{1F642}':'\u{1F615}')))),
        el('div',{class:'revbtns'},
          el('button',{class:'primary',onclick:()=>{
            a.flagged=false;a.lastReviewedAt=App.now().toISOString();touch();
            toast('Back in the rotation');
            renderView(App.stack[App.stack.length-1]);
          }},'Keep it'),
          el('button',{onclick:()=>nav('editor',{id:a.id})},'Edit'),
          el('button',{class:'danger',onclick:()=>{
            a.retired=true;a.flagged=false;a.lastReviewedAt=App.now().toISOString();touch();
            toast('Retired — restore it any time from here');
            renderView(App.stack[App.stack.length-1]);
          }},'Retire'))));
    }
  }
  const retired=App.data.activities.filter(a=>a.retired);
  if(retired.length){
    m.append(el('h3',{style:'margin-top:26px;font-size:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint)'},'Retired ('+retired.length+')'));
    for(const a of retired){
      m.append(el('div',{class:'card row'},
        el('div',{style:'flex:1'},el('div',{style:'font-weight:650;color:var(--fg-dim)'},a.name)),
        el('button',{class:'small',onclick:()=>{
          a.retired=false;touch();toast('Restored');
          renderView(App.stack[App.stack.length-1]);
        }},'Restore')));
    }
  }
}
/* ---- editor ---- */
function renderEditor(m,p){
  const existing=p.id?A(p.id):null;
  setTitle(existing?'Edit activity':'New activity');
  const a=existing||{name:'',description:'',category:'sensory',
    ageRange:{minMonths:Math.max(0,Math.floor((ageMonths()||3))-1),maxMonths:Math.floor((ageMonths()||3))+3},
    baseDuration:5,tags:[],retired:false};
  const fName=el('input',{type:'text',value:a.name,placeholder:'e.g. Sock puppet chat'});
  const cats=[...new Set([...Object.keys(CATEGORY_META),...App.data.activities.map(x=>x.category)])];
  const fCat=el('input',{type:'text',value:a.category,list:'catlist'});
  const dl=el('datalist',{id:'catlist'},cats.map(c=>el('option',{value:c})));
  const fDesc=el('textarea',{rows:6,placeholder:'What to do, what to watch for…'},a.description);
  const fMin=el('input',{type:'number',inputmode:'numeric',min:0,max:60,value:a.ageRange.minMonths});
  const fMax=el('input',{type:'number',inputmode:'numeric',min:0,max:60,value:a.ageRange.maxMonths});
  const fDur=el('input',{type:'number',inputmode:'numeric',min:1,max:120,value:a.baseDuration});
  const fTags=el('input',{type:'text',value:a.tags.join(', '),placeholder:'quiet, props, wind-down'});
  /* every tag already in the bank, tap-to-toggle — no guessing what exists */
  const allTags=[...new Set(App.data.activities.flatMap(x=>x.tags))].sort();
  const parseTags=()=>fTags.value.split(',').map(t=>t.trim()).filter(Boolean);
  const tagWrap=el('div',{class:'chipwrap'});
  function drawTagChips(){
    tagWrap.innerHTML='';
    const cur=parseTags();
    for(const t of allTags){
      tagWrap.append(el('button',{class:'chip'+(cur.includes(t)?' on':''),onclick:()=>{
        let list=parseTags();
        if(list.includes(t))list=list.filter(x=>x!==t);else list.push(t);
        fTags.value=list.join(', ');
        drawTagChips();
      }},t));
    }
  }
  drawTagChips();
  fTags.addEventListener('input',debounce(drawTagChips,200));
  const fRetired=existing?el('input',{type:'checkbox',checked:a.retired,style:'width:auto;min-height:auto'}):null;
  m.append(
    el('label',null,'Name'),fName,
    el('label',null,'Category'),fCat,dl,
    el('label',null,'Description'),fDesc,
    el('label',null,'Age range (months)'),
    el('div',{class:'agerow'},fMin,el('span',{class:'dim'},'to'),fMax),
    el('label',null,'Planned duration (minutes)'),fDur,
    el('label',null,'Tags (comma-separated)'),fTags,
    allTags.length?el('div',{class:'small faint',style:'margin-top:8px'},'Tap to toggle an existing tag, or type new ones above:'):null,
    tagWrap);
  if(existing){
    m.append(el('div',{class:'setrow',style:'margin-top:14px'},fRetired,
      el('span',null,'Retired (hidden from picks and browse)')));
    if(existing.history.length){
      m.append(el('div',{class:'small faint',style:'margin-top:10px'},
        existing.history.length+' completions recorded · learnt duration ~'+expectedDuration(existing)+' min'),
        el('button',{class:'small danger',style:'margin-top:8px',onclick:async()=>{
          if(await confirmDlg('Clear this activity’s history?\n\nResets the learnt duration back to the planned '+existing.baseDuration+' min and clears any feedback streak.',{danger:true,okText:'Clear history'})){
            existing.history=[];existing.flagged=false;existing.lastReviewedAt=null;touch();
            toast('History cleared');
            renderView(App.stack[App.stack.length-1]);
          }
        }},'Clear history'));
    }
  }
  const foot=el('div',{class:'formfoot'});
  foot.append(el('button',{class:'primary',onclick:()=>{
    const name=fName.value.trim();
    if(!name){toast('Give it a name','err');return;}
    const lo=clampNum(fMin.value,0,60,0),hi=clampNum(fMax.value,0,60,12);
    if(hi<lo){toast('Age range is upside down','err');return;}
    const vals={
      name,category:fCat.value.trim()||'other',description:fDesc.value,
      ageRange:{minMonths:lo,maxMonths:hi},
      baseDuration:clampNum(fDur.value,1,120,5),
      tags:fTags.value.split(',').map(t=>t.trim()).filter(Boolean)
    };
    if(existing){
      const authoredChanged=!existing.custom&&(
        existing.name!==vals.name||existing.description!==vals.description||
        existing.category!==vals.category||existing.baseDuration!==vals.baseDuration||
        existing.ageRange.minMonths!==lo||existing.ageRange.maxMonths!==hi||
        existing.tags.join(',')!==vals.tags.join(','));
      Object.assign(existing,vals);
      if(authoredChanged)existing.modified=true;
      if(fRetired)existing.retired=fRetired.checked;
      touch();toast('Saved');
      goBack();
    }else{
      App.data.activities.push(Object.assign({id:uid(),flagged:false,retired:false,
        custom:true,modified:false,lastReviewedAt:null,history:[]},vals));
      touch();toast('Added — it’s in the bank');
      goBack();
    }
  }},'Save'));
  if(existing&&existing.custom){
    foot.append(el('button',{class:'danger',onclick:async()=>{
      if(await confirmDlg('Delete “'+existing.name+'” for good?\nIts history goes with it.',{danger:true,okText:'Delete'})){
        App.data.activities=App.data.activities.filter(x=>x.id!==existing.id);
        const it=App.data.itinerary;
        if(it){
          /* drop the deleted activity from any itinerary in progress */
          it.items=it.items.filter(i=>i.activityId!==existing.id);
          const next=it.items.findIndex(i=>i.status==='pending');
          if(next===-1)App.data.itinerary=null;else it.pos=next;
        }
        touch();toast('Deleted');
        goHome();
      }
    }},'Delete'));
  }
  m.append(foot);
  if(existing&&!existing.custom)m.append(el('p',{class:'small faint',style:'margin-top:14px'},
    'This is a built-in activity — it can be edited or retired, but not deleted.'));
}
/* ---- settings ---- */
function renderSettings(m){
  setTitle('Settings');
  /* bub */
  const dob=el('input',{type:'date',value:App.data.settings.birthDate||'',max:localToday()});
  const sec1=el('div',{class:'setsec'},
    el('h3',null,'Bub'),
    el('label',{style:'margin-top:0'},'Date of birth'),dob,
    el('button',{class:'small',style:'margin-top:10px',onclick:()=>{
      if(!dob.value){toast('Pick a date first','err');return;}
      App.data.settings.birthDate=dob.value;touch();
      toast('Saved — bub is '+ageLabel());
    }},'Save date'));
  /* appearance */
  const themeNow=document.documentElement.dataset.theme;
  const THEME_CHOICES=[['light','☀️ Light'],['dark','\u{1F319} Dark'],['pastel','\u{1F338} Pastel']];
  const sec2=el('div',{class:'setsec'},
    el('h3',null,'Appearance'),
    el('div',{class:'row'},THEME_CHOICES.map(([id,label])=>
      el('button',{class:themeNow===id?'primary':'',style:'flex:1','aria-pressed':themeNow===id?'true':'false',
        onclick:()=>setTheme(id)},label))));
  /* data */
  const importInput=el('input',{type:'file',accept:'.json,application/json',style:'display:none',onchange:async e=>{
    const f=e.target.files[0];
    e.target.value='';
    if(!f)return;
    try{
      const text=await f.text();
      const d=normalize(JSON.parse(text));
      mergeSeeds(d); /* an older backup still gets newer seed activities */
      if(await confirmDlg('Replace ALL current data with this backup?\n\nActivities, history and settings will be overwritten.',{danger:true,okText:'Replace'})){
        App.data=d;
        schedulePersist.now();
        toast('Backup restored');
        resetStack(App.data.settings.birthDate?'home':'onboarding');
      }
    }catch(err){toast('That file isn’t a Baby Time backup','err');}
  }});
  const sec3=el('div',{class:'setsec'},
    el('h3',null,'Data'),
    el('div',{class:'row'},
      el('button',{style:'flex:1',onclick:()=>{
        const blob=new Blob([JSON.stringify(App.data,null,1)],{type:'application/json'});
        const u=URL.createObjectURL(blob);
        const aEl=el('a',{href:u,download:'baby-time-backup-'+localToday()+'.json'});
        document.body.append(aEl);aEl.click();aEl.remove();
        setTimeout(()=>URL.revokeObjectURL(u),4000);
        toast('Backup downloaded');
      }},'⬇ Export backup'),
      el('button',{style:'flex:1',onclick:()=>importInput.click()},'⬆ Import backup')),
    importInput,
    el('p',{class:'small faint'},'Everything lives on this device only. Export now and then and stash the file in your cloud drive.'));
  /* install */
  const sec4=el('div',{class:'setsec'},el('h3',null,'App'));
  const standalone=window.matchMedia&&matchMedia('(display-mode: standalone)').matches;
  const ios=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if(standalone){
    sec4.append(el('p',{class:'small faint',style:'margin:0'},'Installed and ready — you’re using the app.'));
  }else if(App.installPrompt){
    sec4.append(el('button',{onclick:()=>{
      const p=App.installPrompt;
      App.installPrompt=null; /* the prompt event is single-use */
      p.prompt();
      renderView(App.stack[App.stack.length-1]);
    }},'\u{1F4F2} Install as app'));
  }else if(ios){
    sec4.append(el('p',{class:'small faint',style:'margin:0'},
      'To install on iPhone/iPad: tap the Share button, then “Add to Home Screen”.'));
  }else{
    sec4.append(el('p',{class:'small faint',style:'margin:0'},
      'To install: open this page in Chrome, then menu ⋮ → “Add to home screen”.'));
  }
  /* danger */
  const sec5=el('div',{class:'setsec'},
    el('h3',null,'Danger zone'),
    el('button',{class:'danger',onclick:async()=>{
      if(!await confirmDlg('Erase ALL data?\n\nEvery activity, all history, and bub’s details.',{danger:true,okText:'Erase'}))return;
      if(!await confirmDlg('Really sure? There’s no undo (unless you exported a backup).',{danger:true,okText:'Erase everything'}))return;
      await store.del('data');await store.del('backup');
      App.data=seedData();
      schedulePersist.now();
      toast('Fresh start');
      resetStack('onboarding');
    }},'Erase all data'),
    el('p',{class:'small faint'},'Baby Time v1 · data format v'+App.data.version+' · seed set v'+App.data.seedVersion));
  m.append(sec1,sec2,sec3,sec4,sec5);
  /* dev panel — localhost only */
  if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){
    const off=el('input',{type:'number',inputmode:'numeric',value:Math.round(App.nowOffsetMs/86400000),style:'width:90px'});
    m.append(el('div',{class:'devpanel'},
      el('h3',{style:'margin-top:0;font-size:14px'},'\u{1F6E0} Dev panel (localhost only)'),
      el('div',{class:'row'},
        el('span',{class:'small dim'},'Clock shift (days):'),off,
        el('button',{class:'small',onclick:()=>{
          App.nowOffsetMs=(+off.value||0)*86400000;
          toast('Clock shifted — bub is now '+ageLabel());
          renderView(App.stack[App.stack.length-1]);
        }},'Apply')),
      el('div',{class:'row',style:'margin-top:10px'},
        el('button',{class:'small',onclick:()=>{devSeedHistory();toast('Sample history written');}},'Seed sample history'),
        el('button',{class:'small',onclick:()=>{
          const r=buildItinerary(30,mulberry32(42));
          console.log('Seeded 30-min itinerary:',r.items.map(a=>a.id),r.note);
          toast('Seeded itinerary logged to console');
        }},'Log seeded itinerary'))));
  }
}
function mulberry32(seed){let t=seed;return function(){t|=0;t=(t+0x6D2B79F5)|0;let r=Math.imul(t^(t>>>15),1|t);r=(r+Math.imul(r^(r>>>7),61|r))^r;return((r^(r>>>14))>>>0)/4294967296;};}
function devSeedHistory(){
  const rng=mulberry32(7);
  const acts=App.data.activities.filter(a=>!a.custom).slice(0,15);
  acts.forEach((a,idx)=>{
    a.history=[];a.flagged=false;a.lastReviewedAt=null;
    const n=2+Math.floor(rng()*6);
    for(let i=n;i>0;i--){
      const at=new Date(App.now()-i*86400000-Math.floor(rng()*4)*3600000);
      a.history.push({at:at.toISOString(),
        engagedMinutes:Math.max(1,Math.round(a.baseDuration*(0.5+rng()))),
        wentWell:rng()>0.25});
    }
  });
  /* one guaranteed 3-poor streak for testing the flag flow */
  const victim=acts[2];
  if(victim){
    for(let i=3;i>0;i--){
      victim.history.push({at:new Date(App.now()-i*3600000).toISOString(),
        engagedMinutes:2,wentWell:false});
    }
    if(poorStreak(victim)>=3)victim.flagged=true;
  }
  touch();
}
/* ============================= INIT ============================= */
async function init(){
  const secure=location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
  if(secure){
    if(!document.querySelector('link[rel=manifest]'))
      document.head.append(el('link',{rel:'manifest',href:'manifest.webmanifest'}));
    if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    App.installPrompt=e;
    try{
      if(!localStorage.getItem('bt-install-hint')){
        localStorage.setItem('bt-install-hint','1');
        toast('Tip: install Baby Time as an app from Settings');
      }
    }catch(err){}
  });
  window.addEventListener('appinstalled',()=>{App.installPrompt=null;toast('Installed — it’s on your home screen');});
  $('#tbBack').addEventListener('click',goBack);
  $('#modalWrap').addEventListener('click',e=>{if(e.target.id==='modalWrap')cancelModal();});
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&modalState.open)cancelModal();
  });
  /* flush pending writes when the app is backgrounded; re-acquire the wake
     lock when it returns (the UA auto-releases it on hide) */
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden')schedulePersist.now();
    else if(document.visibilityState==='visible')requestWakeLock();
  });
  window.addEventListener('pagehide',()=>schedulePersist.now());
  await store.init();
  const rec=await store.get('data');
  let primaryOk=false;
  if(rec&&rec.json){
    try{App.data=normalize(JSON.parse(rec.json));primaryOk=true;}
    catch(e){
      console.warn('primary data unreadable',e);
      const bak=await store.get('backup');
      if(bak&&bak.json){
        try{
          App.data=normalize(JSON.parse(bak.json));
          toast('Restored from the daily backup','err');
          schedulePersist.now(); /* re-persist the good copy straight away */
        }catch(e2){}
      }
    }
  }
  if(!App.data)App.data=seedData();
  else if(mergeSeeds(App.data)){touch();}
  /* once-a-day rolling backup — only ever of a state that parsed cleanly */
  if(primaryOk){
    const bak=await store.get('backup');
    const dayOf=t=>{const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
    if(!bak||dayOf(bak.time)!==localToday()){
      await store.set('backup',{time:Date.now(),json:rec.json});
    }
  }
  const first={view:App.data.settings.birthDate?'home':'onboarding',params:{}};
  App.stack=[first];
  history.replaceState({d:0},'');
  renderView(first);
}
init();
</script>
